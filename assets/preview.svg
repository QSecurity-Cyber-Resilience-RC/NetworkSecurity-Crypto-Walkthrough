<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="glowCyan" cx="82%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#38cfe6" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#38cfe6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMint" cx="6%" cy="108%" r="60%">
      <stop offset="0%" stop-color="#57e39a" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#57e39a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#789bc8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="480" fill="#0a1526"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <rect width="1200" height="480" fill="url(#glowCyan)"/>
  <rect width="1200" height="480" fill="url(#glowMint)"/>
  <rect x="1" y="1" width="1198" height="478" fill="none" stroke="#789bc8" stroke-opacity="0.14"/>

  <!-- eyebrow -->
  <line x1="64" y1="86" x2="92" y2="86" stroke="#38cfe6" stroke-width="1"/>
  <text x="104" y="91" fill="#38cfe6" font-size="15" font-weight="600" letter-spacing="4">CRYPTOGRAPHY, FROM THE INSIDE</text>

  <!-- title -->
  <text x="62" y="168" fill="#eef3fa" font-size="54" font-weight="700" letter-spacing="-0.5">Cryptography, worked step by step</text>

  <!-- subtitle -->
  <text x="64" y="212" fill="#93a6c4" font-size="21">Interactive, verified walkthroughs for a Network Security course</text>

  <!-- topic chips -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="17" text-anchor="middle">
    <g>
      <rect x="64" y="256" width="182" height="44" rx="11" fill="#102340" stroke="#38cfe6" stroke-opacity="0.5"/>
      <text x="155" y="284" fill="#bff0f8">Primitive roots</text>
    </g>
    <g>
      <rect x="260" y="256" width="182" height="44" rx="11" fill="#0c1c33" stroke="#789bc8" stroke-opacity="0.2"/>
      <text x="351" y="284" fill="#cfe0f2">Diffie-Hellman</text>
    </g>
    <g>
      <rect x="456" y="256" width="96" height="44" rx="11" fill="#0c1c33" stroke="#789bc8" stroke-opacity="0.2"/>
      <text x="504" y="284" fill="#cfe0f2">RSA</text>
    </g>
    <g>
      <rect x="566" y="256" width="96" height="44" rx="11" fill="#0c1c33" stroke="#789bc8" stroke-opacity="0.2"/>
      <text x="614" y="284" fill="#cfe0f2">DES</text>
    </g>
    <g>
      <rect x="676" y="256" width="96" height="44" rx="11" fill="#0c1c33" stroke="#789bc8" stroke-opacity="0.2"/>
      <text x="724" y="284" fill="#cfe0f2">AES</text>
    </g>
  </g>

  <!-- legend -->
  <g font-size="16">
    <circle cx="72" cy="366" r="7" fill="#38cfe6"/>
    <text x="88" y="371" fill="#93a6c4">public</text>
    <circle cx="182" cy="366" r="7" fill="#f4a52a"/>
    <text x="198" y="371" fill="#93a6c4">secret</text>
    <circle cx="292" cy="366" r="7" fill="#57e39a"/>
    <text x="308" y="371" fill="#93a6c4">shared</text>
    <circle cx="404" cy="366" r="7" fill="#ff6f7a"/>
    <text x="420" y="371" fill="#93a6c4">eavesdropper</text>
  </g>

  <!-- sample tokens -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14">
    <rect x="64" y="404" width="150" height="34" rx="8" fill="rgba(56,207,230,0.12)" stroke="#38cfe6" stroke-opacity="0.5"/>
    <text x="80" y="426" fill="#bff0f8">n = 3233</text>
    <rect x="228" y="404" width="176" height="34" rx="8" fill="rgba(244,165,42,0.12)" stroke="#f4a52a" stroke-opacity="0.5" stroke-dasharray="4 3"/>
    <text x="244" y="426" fill="#f8dca8">d = private key</text>
    <rect x="418" y="404" width="210" height="34" rx="8" fill="rgba(87,227,154,0.12)" stroke="#57e39a" stroke-opacity="0.5"/>
    <text x="434" y="426" fill="#c2f4da">ct = 69C4E0D8...</text>
  </g>

  <text x="1136" y="426" fill="#5f7392" font-size="15" text-anchor="end">25 worked examples, every value verified</text>
</svg>
